<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">OPEIS Master generation workflow</title>
  <desc id="desc">A four-step workflow from experiment parameters to validated CHI Macro Command scripts.</desc>
  <rect width="1280" height="520" fill="#ffffff"/>
  <text x="64" y="78" fill="#1f2937" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">从实验方案到 CHI Macro Command</text>
  <text x="64" y="112" fill="#5b6776" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18">所有计算留在应用内部，最终脚本只保留可执行命令</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="70" y="180" width="230" height="170" rx="12" fill="#eef2ff" stroke="#9aa8ff"/>
  <text x="100" y="226" fill="#1f2937" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="23" font-weight="700">1. 输入参数</text>
  <text x="100" y="266" fill="#425066" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">电池质量 / 容量</text>
  <text x="100" y="296" fill="#425066" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">工步、脉冲、EIS</text>
  <text x="100" y="326" fill="#425066" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">预设文件</text>

  <line x1="310" y1="265" x2="420" y2="265" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="430" y="180" width="230" height="170" rx="12" fill="#ecfdf5" stroke="#68c59b"/>
  <text x="460" y="226" fill="#1f2937" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="23" font-weight="700">2. 领域计算</text>
  <text x="460" y="266" fill="#425066" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">1C 与倍率换算</text>
  <text x="460" y="296" fill="#425066" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">时间 / 电压取点展开</text>
  <text x="460" y="326" fill="#425066" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">EIS 中断估算</text>

  <line x1="670" y1="265" x2="780" y2="265" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="790" y="180" width="230" height="170" rx="12" fill="#fff7ed" stroke="#f0a35f"/>
  <text x="820" y="226" fill="#1f2937" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="23" font-weight="700">3. 风险校验</text>
  <text x="820" y="266" fill="#425066" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">Warnings 显著展示</text>
  <text x="820" y="296" fill="#425066" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">Errors 阻止生成</text>
  <text x="820" y="326" fill="#425066" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17">采样看板辅助判断</text>

  <line x1="1030" y1="265" x2="1140" y2="265" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="850" y="388" width="360" height="72" rx="12" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="880" y="432" fill="#374151" font-family="Consolas, monospace" font-size="17">cellon → cp/impft/impsf → celloff → end</text>

  <rect x="1150" y="180" width="80" height="170" rx="12" fill="#111827"/>
  <text x="1175" y="226" fill="#ffffff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="21" font-weight="700">CHI</text>
  <text x="1170" y="266" fill="#d1d5db" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16">纯命令</text>
  <text x="1168" y="296" fill="#d1d5db" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16">可复制</text>
</svg>
